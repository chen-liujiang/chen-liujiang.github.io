<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 凌空纪</title>
    <link rel="icon" href="/avatar.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="/lib/font-awesome/css/all.min.css">
    <style>
        body { background: #f5f7fa; }
        .login-box {
            max-width: 400px;
            margin: 120px auto;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .admin-container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .admin-header {
            background: #fff;
            border-radius: 16px;
            padding: 20px 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .work-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            gap: 16px;
        }
        .work-item:last-child { border-bottom: none; }
        .work-item:hover { background: #fafafa; }
        .work-info { flex: 1; }
        .work-title { font-weight: 600; font-size: 15px; }
        .work-id { color: #999; font-size: 13px; margin-top: 2px; }
        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: #7c3aed; color: #fff; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: #fff; color: #666; border: 1px solid #ddd; }
        .btn-outline:hover { border-color: #7c3aed; color: #7c3aed; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #333; }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: #7c3aed; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            width: 460px;
            max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
        }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 200;
            display: none;
        }
        .toast.show { display: block; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; }
        .sort-badge {
            display: inline-block;
            background: #f3f4f6;
            color: #6b7280;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="login-page">
        <div class="login-box">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="font-size:28px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">凌空纪</div>
                <div style="color:#999;font-size:14px;margin-top:4px;">管理后台</div>
            </div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码">
            </div>
            <button id="login-btn" class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;margin-top:8px;" onclick="login()">登 录</button>
        </div>
    </div>

    <!-- 管理页面 -->
    <div id="admin-page" style="display:none;">
        <div class="admin-container">
            <div class="admin-header">
                <div>
                    <span style="font-size:20px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">凌空纪</span>
                    <span style="color:#999;font-size:14px;margin-left:8px;">管理后台</span>
                </div>
                <div style="display:flex;align-items:center;gap:16px;">
                    <a href="/" style="color:#7c3aed;font-size:14px;text-decoration:none;"><i class="fas fa-external-link-alt" style="margin-right:4px;"></i>前台</a>
                    <button class="btn btn-outline btn-sm" onclick="logout()">退出登录</button>
                </div>
            </div>

            <div class="admin-card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <h2 style="font-size:18px;font-weight:700;">作品管理</h2>
                    <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="fas fa-plus" style="margin-right:6px;"></i>添加作品</button>
                </div>
                <div id="works-list"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div id="work-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-title" id="modal-title">添加作品</div>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label class="form-label">抖音视频ID</label>
                <input type="text" id="form-video-id" class="form-input" placeholder="例如：7604456518175526185">
            </div>
            <div class="form-group">
                <label class="form-label">作品标题</label>
                <input type="text" id="form-title" class="form-input" placeholder="例如：翠亨海岸公园">
            </div>
            <div class="form-group">
                <label class="form-label">排序（越小越靠前）</label>
                <input type="number" id="form-sort" class="form-input" placeholder="0" value="0">
            </div>
            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveWork()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="delete-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="text-align:center;">
            <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#f59e0b;margin-bottom:16px;"></i>
            <div style="font-size:16px;font-weight:600;margin-bottom:8px;">确认删除</div>
            <div style="color:#666;font-size:14px;margin-bottom:24px;">删除后无法恢复，确定要删除这个作品吗？</div>
            <input type="hidden" id="delete-id">
            <div style="display:flex;gap:12px;justify-content:center;">
                <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div id="toast" class="toast"></div>

    <script>
        var API = window.location.port === '5000' ? 'http://localhost:5000' : '';
        let loggedIn = false;

        // 页面加载时检查登录状态
        async function checkLogin() {
            try {
                const res = await fetch(API + '/api/admin/check', { credentials: 'include' });
                const data = await res.json();
                if (data.code === 0) {
                    loggedIn = true;
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('admin-page').style.display = 'block';
                    loadWorks();
                } else {
                    // token 无效或过期，显示登录页
                    document.getElementById('login-page').style.display = 'block';
                    document.getElementById('admin-page').style.display = 'none';
                }
            } catch (e) {
                // 请求异常，显示登录页
                document.getElementById('login-page').style.display = 'block';
                document.getElementById('admin-page').style.display = 'none';
            }
        }
        checkLogin();

        // 登录
        async function login() {
            const loginBtn = document.getElementById('login-btn');
            if (loginBtn.disabled) return;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(API + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.code === 0) {
                    loggedIn = true;
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('admin-page').style.display = 'block';
                    loadWorks();
                } else {
                    showToast(data.message, 'error');
                    // 如果被锁定(429)，禁用登录按钮并倒计时
                    if (res.status === 429) {
                        loginBtn.disabled = true;
                        loginBtn.textContent = '已锁定';
                        let countdown = 300;
                        if (data.message.match(/(\d+)秒/)) {
                            countdown = parseInt(data.message.match(/(\d+)秒/)[1]);
                        }
                        const timer = setInterval(() => {
                            countdown--;
                            loginBtn.textContent = '已锁定 (' + countdown + 's)';
                            if (countdown <= 0) {
                                clearInterval(timer);
                                loginBtn.disabled = false;
                                loginBtn.textContent = '登 录';
                            }
                        }, 1000);
                    }
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        // 退出登录
        async function logout() {
            try {
                await fetch(API + '/api/admin/logout', { method: 'POST', credentials: 'include' });
            } catch (e) {}
            loggedIn = false;
            window.location.href = '/';
        }

        // 加载作品列表
        async function loadWorks() {
            try {
                const res = await fetch(API + '/api/admin/works', { credentials: 'include' });
                const data = await res.json();
                if (data.code === 0) {
                    renderWorks(data.data);
                }
            } catch (e) {
                showToast('加载失败', 'error');
            }
        }

        // 渲染作品列表
        function renderWorks(works) {
            const container = document.getElementById('works-list');
            if (works.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="far fa-folder-open"></i><div>暂无作品，点击上方按钮添加</div></div>';
                return;
            }
            container.innerHTML = works.map(w => `
                <div class="work-item">
                    <div class="work-info">
                        <div class="work-title">${escapeHtml(w.title)}<span class="sort-badge">排序: ${w.sort_order}</span></div>
                        <div class="work-id">视频ID: ${escapeHtml(w.video_id)}</div>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="openEditModal(${w.id}, '${escapeHtml(w.video_id)}', '${escapeHtml(w.title)}', ${w.sort_order})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${w.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        // HTML转义
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // 打开添加弹窗
        function openAddModal() {
            document.getElementById('modal-title').textContent = '添加作品';
            document.getElementById('edit-id').value = '';
            document.getElementById('form-video-id').value = '';
            document.getElementById('form-title').value = '';
            document.getElementById('form-sort').value = '0';
            document.getElementById('work-modal').style.display = 'flex';
        }

        // 打开编辑弹窗
        function openEditModal(id, videoId, title, sortOrder) {
            document.getElementById('modal-title').textContent = '编辑作品';
            document.getElementById('edit-id').value = id;
            document.getElementById('form-video-id').value = videoId;
            document.getElementById('form-title').value = title;
            document.getElementById('form-sort').value = sortOrder;
            document.getElementById('work-modal').style.display = 'flex';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('work-modal').style.display = 'none';
        }

        // 保存作品
        async function saveWork() {
            const editId = document.getElementById('edit-id').value;
            const videoId = document.getElementById('form-video-id').value.trim();
            const title = document.getElementById('form-title').value.trim();
            const sortOrder = parseInt(document.getElementById('form-sort').value) || 0;

            if (!videoId || !title) {
                showToast('视频ID和标题不能为空', 'error');
                return;
            }

            try {
                let url, method;
                if (editId) {
                    url = API + '/api/admin/works/' + editId;
                    method = 'PUT';
                } else {
                    url = API + '/api/admin/works';
                    method = 'POST';
                }

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ video_id: videoId, title: title, sort_order: sortOrder }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast(editId ? '更新成功' : '添加成功', 'success');
                    closeModal();
                    loadWorks();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // 打开删除确认弹窗
        function openDeleteModal(id) {
            document.getElementById('delete-id').value = id;
            document.getElementById('delete-modal').style.display = 'flex';
        }

        // 关闭删除确认弹窗
        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }

        // 确认删除
        async function confirmDelete() {
            const id = document.getElementById('delete-id').value;
            try {
                const res = await fetch(API + '/api/admin/works/' + id, { method: 'DELETE', credentials: 'include' });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('删除成功', 'success');
                    closeDeleteModal();
                    loadWorks();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        // Toast提示
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || '');
            setTimeout(() => { toast.className = 'toast'; }, 2000);
        }

        // 回车登录
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
